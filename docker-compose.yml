services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: tarimcik-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tarimcik
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for caching and background tasks)
  redis:
    image: redis:7-alpine
    container_name: tarimcik-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tarimcik-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/tarimcik
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/tarimcik
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      SECRET_KEY: change-this-in-production-to-a-secure-key
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tarimcik-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
